<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>출석 체크</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8f6;
  --card:#ffffff;
  --text:#1a1a1a;
  --muted:#888;
  --border:#e8e8e6;
  --accent:#1a1a1a;
  --accent-light:#f0f0ee;
  --purple:#7F77DD;
  --purple-light:#EEEDFE;
  --green:#3B6D11;
  --green-light:#EAF3DE;
  --red:#E24B4A;
  --red-light:#FCEBEB;
  --radius:14px;
  --radius-sm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
.container{width:100%;max-width:420px}
.screen{display:none}.screen.active{display:block}

.logo{text-align:center;margin-bottom:2rem}
.logo-icon{width:56px;height:56px;background:var(--accent);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
.logo-icon svg{width:28px;height:28px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo h1{font-size:22px;font-weight:600;letter-spacing:-0.5px}
.logo p{font-size:14px;color:var(--muted);margin-top:4px}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem}
.field-label{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:8px}
.field-group{margin-bottom:14px}
.store-name{font-size:17px;font-weight:600;color:var(--text);padding:12px 0 4px;text-align:center}
.store-badge{display:inline-block;background:var(--accent);color:#fff;font-size:12px;font-weight:500;padding:4px 12px;border-radius:20px;margin-bottom:1.25rem}

.text-input{width:100%;padding:14px 16px;font-size:16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);outline:none;transition:border-color 0.15s;font-family:inherit}
.text-input:focus{border-color:var(--accent);background:#fff}
.err-msg{font-size:12px;color:var(--red);margin-top:6px;display:none}
.checkin-btn{width:100%;margin-top:4px;padding:15px;font-size:16px;font-weight:600;border-radius:var(--radius-sm);border:none;background:var(--accent);color:#fff;cursor:pointer;transition:opacity 0.15s,transform 0.1s;font-family:inherit}
.checkin-btn:hover{opacity:0.88}
.checkin-btn:active{transform:scale(0.98)}
.checkin-btn:disabled{opacity:0.5;cursor:not-allowed}
.admin-link{text-align:center;margin-top:1.25rem}
.admin-link button{background:none;border:none;font-size:12px;color:var(--muted);cursor:pointer;padding:4px 8px;font-family:inherit}
.admin-link button:hover{color:var(--text)}
.hint{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;line-height:1.6}

.result-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem 1.75rem;text-align:center}
.result-celebrate{display:inline-flex;align-items:center;gap:6px;background:var(--purple-light);color:var(--purple);font-size:13px;font-weight:500;padding:6px 14px;border-radius:20px;margin-bottom:1.25rem}
.result-already{display:inline-flex;align-items:center;gap:6px;background:var(--accent-light);color:var(--muted);font-size:13px;padding:6px 14px;border-radius:20px;margin-bottom:1.25rem}
.result-store{font-size:12px;color:var(--muted);margin-bottom:4px}
.result-name{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:4px}
.result-sub{font-size:14px;color:var(--muted);margin-bottom:2rem}
.stamps{display:flex;justify-content:center;gap:10px;margin-bottom:1.75rem;flex-wrap:wrap}
.stamp{width:50px;height:50px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;transition:background 0.25s,border-color 0.25s}
.stamp.done{background:var(--accent);border-color:var(--accent)}
.stamp.done svg{stroke:#fff}
.stamp svg{width:20px;height:20px;stroke:transparent;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s}
.stamp.pop{animation:pop 0.35s ease}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.3)}70%{transform:scale(0.9)}100%{transform:scale(1)}}
.result-total{font-size:12px;color:var(--muted);margin-bottom:1.75rem}
.back-btn{padding:11px 32px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:background 0.15s}
.back-btn:hover{background:var(--accent-light)}

.login-wrap{max-width:320px;margin:0 auto}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2rem}
.login-title{font-size:18px;font-weight:600;text-align:center;margin-bottom:1.5rem;letter-spacing:-0.3px}
.pw-input{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;outline:none;font-family:inherit;transition:border-color 0.15s}
.pw-input:focus{border-color:var(--accent);background:#fff}
.login-btns{display:flex;gap:8px;margin-top:12px}
.login-btns button{flex:1;padding:11px;border-radius:var(--radius-sm);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-cancel{border:1.5px solid var(--border);background:transparent;color:var(--text)}
.btn-ok{border:none;background:var(--accent);color:#fff}
.btn-cancel:hover,.btn-ok:hover{opacity:0.8}
.login-err{font-size:12px;color:var(--red);margin-top:8px;text-align:center;display:none}

.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.admin-title{font-size:20px;font-weight:600;letter-spacing:-0.4px}
.hdr-btns{display:flex;gap:8px;flex-wrap:wrap}
.sm-btn{padding:7px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:5px;transition:background 0.15s}
.sm-btn:hover{background:var(--accent-light)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:1rem;text-align:center}
.stat-n{font-size:26px;font-weight:700;letter-spacing:-0.5px}
.stat-l{font-size:11px;color:var(--muted);margin-top:3px;font-weight:500}
.filter-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;transition:all 0.15s}
.tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.store-select{padding:7px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;outline:none}
.mlist{display:flex;flex-direction:column;gap:8px}
.mc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;gap:14px}
.av{width:40px;height:40px;border-radius:50%;background:var(--purple-light);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:14px;font-weight:600;color:var(--text)}
.mc-sub{font-size:12px;color:var(--muted);margin-top:2px}
.mini-dots{display:flex;gap:4px;margin-top:7px}
.md{width:9px;height:9px;border-radius:50%;background:var(--border)}
.md.on{background:var(--accent)}
.mc-acts{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.icon-btn{width:30px;height:30px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;transition:background 0.15s}
.icon-btn:hover{background:var(--accent-light);color:var(--text)}
.badge-done{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:var(--green-light);color:var(--green);margin-left:6px}
.badge-prog{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;background:var(--purple-light);color:var(--purple);margin-left:6px}
.store-tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;background:var(--accent-light);color:var(--muted);margin-left:4px}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:14px}
.loading{text-align:center;padding:1rem;color:var(--muted);font-size:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">

<!-- 유저 화면 -->
<div id="s-user" class="screen active">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    <h1>출석 체크</h1>
    <p id="store-subtitle">매장을 불러오는 중...</p>
  </div>
  <div class="card">
    <div id="store-label-wrap" style="text-align:center;margin-bottom:1.25rem;display:none">
      <span class="store-badge" id="store-label"></span>
    </div>
    <div class="field-group">
      <div class="field-label">닉네임</div>
      <input class="text-input" id="nick" type="text" placeholder="닉네임 입력" maxlength="20" autocomplete="off" onkeydown="if(event.key==='Enter')document.getElementById('pw-user').focus()">
    </div>
    <div class="field-group">
      <div class="field-label">비밀번호</div>
      <input class="text-input" id="pw-user" type="password" placeholder="비밀번호 입력 (4자리 이상)" maxlength="20" autocomplete="off" onkeydown="if(event.key==='Enter')doCheck()">
      <div class="err-msg" id="user-err"></div>
    </div>
    <button class="checkin-btn" id="checkin-btn" onclick="doCheck()">출석하기</button>
    <div class="hint">처음 오셨나요? 닉네임과 비밀번호를 입력하면 자동으로 가입됩니다</div>
  </div>
  <div class="admin-link"><button onclick="goLogin()">🔒 관리자</button></div>
</div>

<!-- 결과 화면 -->
<div id="s-result" class="screen">
  <div class="result-card" id="result-card"></div>
</div>

<!-- 관리자 로그인 -->
<div id="s-login" class="screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">관리자 로그인</div>
      <input class="pw-input" id="pw-admin" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="login-btns">
        <button class="btn-cancel" onclick="goUser()">취소</button>
        <button class="btn-ok" onclick="doLogin()">확인</button>
      </div>
      <div class="login-err" id="login-err">비밀번호가 틀렸습니다</div>
    </div>
  </div>
</div>

<!-- 관리자 화면 -->
<div id="s-admin" class="screen">
  <div class="admin-header">
    <span class="admin-title">관리자</span>
    <div class="hdr-btns">
      <button class="sm-btn" onclick="doExport()">⬇ 내보내기</button>
      <button class="sm-btn" onclick="goUser()">← 나가기</button>
    </div>
  </div>
  <div class="stats" id="stats"></div>
  <div class="filter-row">
    <button class="tab on" onclick="setTab('all',this)">전체</button>
    <button class="tab" onclick="setTab('today',this)">오늘 출석</button>
    <button class="tab" onclick="setTab('done',this)">7회 달성</button>
    <select class="store-select" id="store-filter" onchange="renderAdmin()">
      <option value="">전체 매장</option>
    </select>
  </div>
  <div class="mlist" id="mlist"></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://tmemetbfazxvbljlmqvx.supabase.co';
const SUPABASE_KEY = 'sb_publishable_OK7adY-y90k9KCdgkWsAgA_l5dWjIQy';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PW = '1234';
const MAX = 7;
const STORES = [
  '범계역점','수원경희대점','용인상현점','범계2호점','서현역점',
  '창원합성본점','창원합성2호점','고척스카이돔점','수원황골점','수원경희대2호점'
];

let curTab = 'all';
let currentStore = '';

function getStoreFromURL() {
  const params = new URLSearchParams(window.location.search);
  return params.get('store') || '';
}

function initStore() {
  const store = getStoreFromURL();
  const sel = document.getElementById('store-filter');
  STORES.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
  if (store && STORES.includes(store)) {
    currentStore = store;
    document.getElementById('store-subtitle').textContent = '닉네임과 비밀번호를 입력하세요';
    document.getElementById('store-label').textContent = store;
    document.getElementById('store-label-wrap').style.display = 'block';
  } else {
    document.getElementById('store-subtitle').textContent = 'URL에 매장 정보가 없습니다';
    document.getElementById('checkin-btn').disabled = true;
  }
}

function today() {
  return new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'-').replace('.','');
}
function isCheckInTime() {
  const now = new Date();
  const seoul = new Date(now.toLocaleString('en-US',{timeZone:'Asia/Seoul'}));
  const h = seoul.getHours();
  return h >= 3 && h < 11;
}
function show(id) {
  ['user','result','login','admin'].forEach(s=>document.getElementById('s-'+s).classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
}
function goUser() {
  show('user');
  document.getElementById('nick').value='';
  document.getElementById('pw-user').value='';
  document.getElementById('user-err').style.display='none';
}
function goLogin() { show('login'); document.getElementById('pw-admin').value=''; document.getElementById('login-err').style.display='none'; }
function doLogin() {
  if(document.getElementById('pw-admin').value===ADMIN_PW){show('admin');renderAdmin();}
  else{document.getElementById('login-err').style.display='block';}
}
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function showErr(msg) {
  const el=document.getElementById('user-err');
  el.textContent=msg;el.style.display='block';
}
function hideErr() {
  document.getElementById('user-err').style.display='none';
}

async function doCheck() {
  const nick = document.getElementById('nick').value.trim();
  const pw = document.getElementById('pw-user').value;
  hideErr();
  if (!nick) { showErr('닉네임을 입력해주세요'); return; }
  if (pw.length < 4) { showErr('비밀번호는 4자리 이상 입력해주세요'); return; }
  if (!isCheckInTime()) { showErr('출석 가능 시간: 오전 3시 ~ 오전 11시'); return; }

  const btn = document.getElementById('checkin-btn');
  btn.disabled=true; btn.textContent='처리 중...';

  try {
    const { data: existing } = await sb
      .from('attendance')
      .select('*')
      .eq('nickname', nick)
      .eq('store', currentStore)
      .single();

    const td = today();
    let member, already=false, reset=false;

    if (!existing) {
      // 신규 가입
      const { data: created, error } = await sb
        .from('attendance')
        .insert({ nickname:nick, store:currentStore, password:pw, count:1, total:1, last_date:td, log:[td] })
        .select().single();
      if (error) { showErr('오류가 발생했습니다'); return; }
      member = created;
    } else {
      // 비밀번호 확인
      if (existing.password !== pw) { showErr('비밀번호가 틀렸습니다'); return; }
      if (existing.last_date === td) {
        member=existing; already=true;
      } else {
        let newCount=existing.count+1, newTotal=existing.total+1;
        let newLog=[...(existing.log||[]),td];
        if(newCount>=MAX){newCount=0;reset=true;}
        const { data: updated } = await sb
          .from('attendance')
          .update({count:newCount,total:newTotal,last_date:td,log:newLog})
          .eq('nickname',nick).eq('store',currentStore)
          .select().single();
        member=updated;
      }
    }
    renderResult(nick, currentStore, member, reset, already);
    show('result');
    if(!already) animateStamps(member, reset);
  } catch(e) {
    showErr('오류가 발생했습니다. 다시 시도해주세요.');
    console.error(e);
  } finally {
    btn.disabled=false; btn.textContent='출석하기';
  }
}

function renderResult(nick, store, m, reset, already) {
  let extra='';
  if(already) extra=`<div class="result-already">⏰ 오늘 이미 출석했어요</div>`;
  else if(reset) extra=`<div class="result-celebrate">🎉 7회 달성! 도장판 초기화</div>`;
  let stamps='';
  for(let i=0;i<MAX;i++){
    const pre=already&&i<m.count;
    stamps+=`<div class="stamp${pre?' done':''}" id="st${i}"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>`;
  }
  document.getElementById('result-card').innerHTML=`
    ${extra}
    <div class="result-store">${store}</div>
    <div class="result-name">${nick}</div>
    <div class="result-sub">${already?'내일 다시 와주세요':reset?'다시 처음부터 시작해요!':m.count+' / '+MAX+' 도장 완료'}</div>
    <div class="stamps">${stamps}</div>
    <div class="result-total">누적 출석 ${m.total}회</div>
    <button class="back-btn" onclick="goUser()">돌아가기</button>
  `;
}

function animateStamps(m, reset) {
  const target=reset?MAX:m.count;
  setTimeout(()=>{
    for(let i=0;i<target;i++){
      setTimeout(()=>{
        const el=document.getElementById('st'+i);
        if(!el)return;
        el.classList.add('done');
        if(i===target-1)el.classList.add('pop');
      },i*100);
    }
  },150);
}

async function renderAdmin() {
  document.getElementById('mlist').innerHTML='<div class="loading">불러오는 중...</div>';
  const storeFil=document.getElementById('store-filter').value;
  let query=sb.from('attendance').select('*').order('total',{ascending:false});
  if(storeFil) query=query.eq('store',storeFil);
  const {data}=await query;
  const all=data||[];
  const td=today();
  const todayCnt=all.filter(m=>m.last_date===td).length;
  const doneCnt=all.filter(m=>m.count===0&&m.total>0).length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${all.length}</div><div class="stat-l">전체 회원</div></div>
    <div class="stat"><div class="stat-n">${todayCnt}</div><div class="stat-l">오늘 출석</div></div>
    <div class="stat"><div class="stat-n">${doneCnt}</div><div class="stat-l">7회 달성</div></div>
  `;
  renderList(all);
}

function renderList(all) {
  const td=today();
  let list=all||[];
  if(curTab==='today') list=list.filter(m=>m.last_date===td);
  if(curTab==='done') list=list.filter(m=>m.count===0&&m.total>0);
  const el=document.getElementById('mlist');
  if(!list.length){el.innerHTML='<div class="empty">데이터가 없습니다</div>';return;}
  el.innerHTML=list.map(m=>{
    const init=m.nickname.slice(0,2);
    const dots=Array.from({length:MAX},(_,i)=>`<div class="md${i<m.count?' on':''}"></div>`).join('');
    const badge=m.count===0&&m.total>0?`<span class="badge-done">달성</span>`:`<span class="badge-prog">${m.count}/${MAX}</span>`;
    return `<div class="mc">
      <div class="av">${init}</div>
      <div class="mc-info">
        <div class="mc-name">${m.nickname}${badge}<span class="store-tag">${m.store}</span></div>
        <div class="mc-sub">누적 ${m.total}회 · 마지막 ${m.last_date||'-'}</div>
        <div class="mini-dots">${dots}</div>
      </div>
      <div class="mc-acts">
        <button class="icon-btn" title="출석수정" onclick="editM('${m.nickname}','${m.store}',${m.count})">✏</button>
        <button class="icon-btn" title="비번초기화" onclick="resetPw('${m.nickname}','${m.store}')">🔑</button>
        <button class="icon-btn" title="삭제" onclick="delM('${m.nickname}','${m.store}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

function setTab(t,btn){
  curTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderAdmin();
}

async function editM(nick,store,count){
  const v=prompt(`[${nick} / ${store}] 현재 ${count}회\n수정할 횟수 (0~6):`,count);
  if(v===null)return;
  const n=parseInt(v);
  if(isNaN(n)||n<0||n>=MAX){alert('0~6 사이 숫자를 입력하세요');return;}
  await sb.from('attendance').update({count:n}).eq('nickname',nick).eq('store',store);
  toast(`${nick} 출석 수정 완료`);
  renderAdmin();
}

async function resetPw(nick,store){
  const newPw=prompt(`[${nick}] 새 비밀번호 입력 (4자리 이상):`);
  if(newPw===null)return;
  if(newPw.length<4){alert('4자리 이상 입력하세요');return;}
  await sb.from('attendance').update({password:newPw}).eq('nickname',nick).eq('store',store);
  toast(`${nick} 비밀번호 초기화 완료`);
}

async function delM(nick,store){
  if(!confirm(`[${nick} / ${store}] 삭제할까요?`))return;
  await sb.from('attendance').delete().eq('nickname',nick).eq('store',store);
  toast(`${nick} 삭제 완료`);
  renderAdmin();
}

async function doExport(){
  const {data}=await sb.from('attendance').select('*').order('store').order('total',{ascending:false});
  const rows=[['매장','닉네임','현재출석','누적출석','마지막출석']];
  (data||[]).forEach(m=>rows.push([m.store,m.nickname,m.count,m.total,m.last_date]));
  const csv='\uFEFF'+rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='출석현황_'+today()+'.csv';
  a.click();
  toast('다운로드 완료');
}

initStore();
</script>
</body>
</html>
